name: Release (build ZIP asset)

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

# IMPORTANT: caller must allow write access for release upload
permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/wp-plugin-release-zip.yml
    secrets: inherit
    with:
      plugin_slug: merineo-product-badges
      zip_name: merineo-product-badges.zip